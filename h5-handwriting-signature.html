<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>H5 手写签名 - Nota Sign</title>
  <style>
/* H5 手写签名 - 横屏布局 */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: var(--ns-font-family);
  background: #f5f5f5;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

:root {
  --ns-font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  --ns-color-brand: #5f11f1;
  --ns-color-brand-hover: #8f59f4;
  --ns-color-brand-active: #3f25a7;
  --ns-color-text-primary: #262626;
  --ns-color-text-secondary: #333333;
  --ns-color-text-tertiary: #929292;
  --ns-color-border: #eaebf0;
  --ns-color-neutral-700: #ffffff;
  --ns-font-size-xs: 12px;
  --ns-font-size-sm: 14px;
  --ns-font-size-md: 16px;
  --ns-line-height-xs: 18px;
  --ns-line-height-sm: 22px;
  --ns-radius-xs: 2px;
  --ns-control-height-lg: 40px;
  --ns-opacity-disabled: 0.4;
}

.signature-page {
  display: flex;
  width: 100%;
  height: 100%;
  min-height: 100dvh;
}

/* 主内容面板（全宽） */
.main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  width: 100%;
  min-width: 0;
  background: #fff;
}

.canvas-section {
  flex: 1;
  min-height: 0;
  padding: 12px 16px 0;
}

.canvas-wrapper {
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* 画布容器 */
.canvas-container {
  position: relative;
  flex: 1;
  min-height: 120px;
  border: 1px dashed #d9d9d9;
  border-radius: 4px;
  background: #fafafa;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

.canvas-container canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.canvas-placeholder {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #bfbfbf;
  font-size: 18px;
  pointer-events: none;
  white-space: nowrap;
}

.canvas-placeholder.is-hidden {
  display: none;
}

/* 右上角工具区 */
.canvas-tools-wrap {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.canvas-tools__toggle {
  margin: 0;
  padding: 8px 12px;
  border: 1px solid var(--ns-color-brand);
  border-radius: var(--ns-radius-xs);
  background: var(--ns-color-neutral-700);
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
  font-family: var(--ns-font-family);
  font-size: var(--ns-font-size-sm);
  line-height: var(--ns-line-height-sm);
  color: var(--ns-color-brand);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  transition: opacity 0.2s, transform 0.2s;
}

.canvas-tools__toggle[hidden] {
  display: none;
}

.canvas-tools__toggle:active {
  opacity: 0.85;
}

.canvas-tools {
  display: none;
  gap: 8px;
  background: rgba(255, 255, 255, 0.92);
  padding: 6px;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
  transform-origin: top right;
}

.canvas-tools-wrap.is-expanded .canvas-tools {
  display: flex;
  animation: canvas-tools-expand 0.22s ease-out;
}

@keyframes canvas-tools-expand {
  from {
    opacity: 0;
    transform: scale(0.92) translateY(-4px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.canvas-tools__btn {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 6px;
  background: #f5f5f5;
  color: #333;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, opacity 0.15s;
}

.canvas-tools__btn:active:not(:disabled) {
  background: #e8e8e8;
}

.canvas-tools__btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* 底部位移滚动条 */
.position-scrollbar {
  flex-shrink: 0;
  padding: 8px 0 4px;
}

.position-scrollbar__track {
  height: 4px;
  background: #e8e8e8;
  border-radius: 2px;
  position: relative;
}

.position-scrollbar__thumb {
  position: absolute;
  top: 0;
  height: 100%;
  background: var(--ns-color-brand);
  border-radius: 2px;
  min-width: 24px;
  transition: left 0.05s linear, width 0.05s linear;
}

/* 底部操作栏 */
.action-bar {
  flex-shrink: 0;
  padding: 12px 16px 16px;
  border-top: 1px solid var(--ns-color-border);
  background: var(--ns-color-neutral-700);
}

.signature-declaration {
  font-size: var(--ns-font-size-xs);
  color: var(--ns-color-text-tertiary);
  margin-bottom: 12px;
  line-height: var(--ns-line-height-xs);
  text-align: left;
}

.action-bar__toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.action-bar__actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

/* NotaSign 按钮基础 */
.ns-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 16px;
  min-height: var(--ns-control-height-lg);
  border: 1px solid transparent;
  border-radius: var(--ns-radius-xs);
  font-family: var(--ns-font-family);
  font-size: var(--ns-font-size-md);
  font-weight: 400;
  line-height: var(--ns-line-height-sm);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: background-color 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
}

.ns-btn:active:not(:disabled) {
  opacity: 0.88;
}

.ns-btn--back {
  padding: 0;
  min-height: auto;
  border: none;
  background: transparent;
  color: var(--ns-color-text-primary);
  font-size: var(--ns-font-size-sm);
  line-height: var(--ns-line-height-sm);
}

.ns-btn--back .ns-btn__icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.ns-btn--outline-brand {
  min-width: 88px;
  background: var(--ns-color-neutral-700);
  border-color: var(--ns-color-brand);
  color: var(--ns-color-brand);
}

.ns-btn--outline-brand:active:not(:disabled) {
  border-color: var(--ns-color-brand-active);
  color: var(--ns-color-brand-active);
}

.ns-btn--primary {
  min-width: 88px;
  background: var(--ns-color-brand);
  border-color: var(--ns-color-brand);
  color: var(--ns-color-neutral-700);
}

.ns-btn--primary:active:not(:disabled) {
  background: var(--ns-color-brand-active);
  border-color: var(--ns-color-brand-active);
}

.ns-btn:disabled {
  cursor: not-allowed;
  opacity: var(--ns-opacity-disabled);
  pointer-events: none;
}

/* 预览弹层等通用按钮 */
.btn {
  padding: 10px 24px;
  border-radius: var(--ns-radius-xs);
  font-size: var(--ns-font-size-md);
  font-weight: 400;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
}

.btn:active {
  opacity: 0.85;
}

.btn--primary {
  background: var(--ns-color-brand);
  color: var(--ns-color-neutral-700);
}

/* 预览弹层 */
.preview-modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
}

.preview-modal[hidden] {
  display: none;
}

.preview-modal__backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}

.preview-modal__content {
  position: relative;
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  max-width: 90vw;
  max-height: 85vh;
  overflow: auto;
  text-align: center;
}

.preview-modal__content h3 {
  font-size: 18px;
  margin-bottom: 8px;
  color: #333;
}

.preview-modal__hint {
  font-size: 12px;
  color: #999;
  margin-bottom: 16px;
}

.preview-modal__content img {
  max-width: 100%;
  max-height: 50vh;
  border: 1px solid #eee;
  border-radius: 4px;
  background: #fafafa;
}

.preview-modal__actions {
  margin-top: 20px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.75);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 200;
  white-space: nowrap;
}

.toast[hidden] {
  display: none;
}

/* 横屏优化 */
@media (orientation: landscape) {
  .canvas-section {
    padding: 8px 12px 0;
  }

  .action-bar {
    padding: 8px 12px 12px;
  }
}

/* 竖屏提示（签名页设计为横屏） */
@media (orientation: portrait) and (max-width: 600px) {
  .signature-page::after {
    content: "建议横屏使用以获得最佳签名体验";
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff3cd;
    color: #856404;
    text-align: center;
    padding: 8px;
    font-size: 12px;
    z-index: 50;
  }
}

  </style>
</head>
<body>
<div class="signature-page" id="signaturePage">
    <main class="main-panel">
      <!-- 手写画布区域 -->
      <section class="canvas-section">
        <div class="canvas-wrapper" id="canvasWrapper">
          <!-- 右上角画布工具 -->
          <div class="canvas-tools-wrap" id="canvasToolsWrap">
            <button type="button" class="canvas-tools__toggle" id="btnToggleTools" aria-expanded="false" aria-controls="canvasTools">
              更多签署区域
            </button>
            <div class="canvas-tools" id="canvasTools">
              <button type="button" class="canvas-tools__btn" id="btnPanLeft" title="左移" aria-label="左移">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M15 18l-6-6 6-6"/>
                </svg>
              </button>
              <button type="button" class="canvas-tools__btn" id="btnPanRight" title="右移" aria-label="右移" disabled>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 18l6-6-6-6"/>
                </svg>
              </button>
              <button type="button" class="canvas-tools__btn" id="btnResetView" title="恢复默认" aria-label="恢复默认" disabled>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
                </svg>
              </button>
              <button type="button" class="canvas-tools__btn" id="btnFitPreview" title="预览" aria-label="预览" disabled>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- 手写画布容器 -->
          <div class="canvas-container" id="canvasContainer">
            <canvas id="displayCanvas"></canvas>
            <p class="canvas-placeholder" id="canvasPlaceholder">请在此处签名</p>
          </div>

          <!-- 底部位移滚动条 -->
          <div class="position-scrollbar" id="positionScrollbar" hidden>
            <div class="position-scrollbar__track">
              <div class="position-scrollbar__thumb" id="scrollbarThumb"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 底部操作区 -->
      <footer class="action-bar">
        <p class="signature-declaration">
          选择「使用签名」即表示您同意，当您（或您的代理人）在文档（包括具有法律约束力的合同）上使用签名和缩写签名时，此签名和缩写签名将是您的签名和缩写签名的电子呈现形式，可用于各种用途。
        </p>
        <div class="action-bar__toolbar">
          <button type="button" class="ns-btn ns-btn--back" id="btnBack" aria-label="返回">
            <svg class="ns-btn__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>返回</span>
          </button>
          <div class="action-bar__actions">
            <button type="button" class="ns-btn ns-btn--outline-brand" id="btnRewrite">重写</button>
            <button type="button" class="ns-btn ns-btn--primary" id="btnComplete" disabled>完成</button>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <!-- 签名预览弹层（演示完成效果） -->
  <div class="preview-modal" id="previewModal" hidden>
    <div class="preview-modal__backdrop" id="previewBackdrop"></div>
    <div class="preview-modal__content">
      <h3>签名预览</h3>
      <p class="preview-modal__hint">按实际笔迹边界裁剪生成签名图片</p>
      <img id="previewImage" alt="签名预览" />
      <div class="preview-modal__actions">
        <button type="button" class="btn btn--primary" id="btnClosePreview">确定</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast" role="alert" hidden></div>

  <script>
/**
 * H5 手绘签名画布 - 扩展画板 3W、左右平移、笔迹适配预览
 * @file signature-canvas.js
 */

(function () {
  'use strict';

  /** @type {number} 默认逻辑画布宽度倍率 */
  const LOGICAL_WIDTH_RATIO_DEFAULT = 1;

  /** @type {number} 扩展后逻辑画布宽度倍率 */
  const LOGICAL_WIDTH_RATIO_EXTENDED = 3;

  /** @type {number} 每次平移步长（占可视区宽度比例） */
  const PAN_STEP_RATIO = 0.5;

  /** @type {number} 笔迹线宽（逻辑坐标） */
  const STROKE_LINE_WIDTH = 3;

  /** @type {number} 裁剪安全边距 */
  const CROP_PADDING = 8;

  /** @typedef {{ x: number, y: number }} Point */
  /** @typedef {{ points: Point[] }} Stroke */

  /** @type {HTMLElement} */
  const container = document.getElementById('canvasContainer');
  /** @type {HTMLCanvasElement} */
  const canvas = document.getElementById('displayCanvas');
  /** @type {CanvasRenderingContext2D} */
  const ctx = canvas.getContext('2d');

  /** @type {HTMLElement} */
  const placeholder = document.getElementById('canvasPlaceholder');
  /** @type {HTMLElement} */
  const positionScrollbar = document.getElementById('positionScrollbar');
  /** @type {HTMLElement} */
  const scrollbarThumb = document.getElementById('scrollbarThumb');
  /** @type {HTMLElement} */
  const canvasTools = document.getElementById('canvasTools');
  /** @type {HTMLElement} */
  const canvasToolsWrap = document.getElementById('canvasToolsWrap');
  /** @type {HTMLButtonElement} */
  const btnToggleTools = document.getElementById('btnToggleTools');
  /** @type {HTMLElement} */
  const toast = document.getElementById('toast');
  /** @type {HTMLElement} */
  const previewModal = document.getElementById('previewModal');
  /** @type {HTMLImageElement} */
  const previewImage = document.getElementById('previewImage');

  /** @type {HTMLButtonElement} */
  const btnPanLeft = document.getElementById('btnPanLeft');
  /** @type {HTMLButtonElement} */
  const btnPanRight = document.getElementById('btnPanRight');
  /** @type {HTMLButtonElement} */
  const btnResetView = document.getElementById('btnResetView');
  /** @type {HTMLButtonElement} */
  const btnFitPreview = document.getElementById('btnFitPreview');
  /** @type {HTMLButtonElement} */
  const btnComplete = document.getElementById('btnComplete');

  /** 可视区尺寸 W × H */
  let viewW = 0;
  let viewH = 0;

  /** 逻辑画布宽度 */
  let logicalW = 0;

  /** @type {boolean} 是否已扩展为 3 倍画板 */
  let isExtended = false;

  /** @type {number} 视角水平偏移（逻辑坐标） */
  let offsetX = 0;

  /** @type {Stroke[]} 全部笔迹 */
  let strokes = [];

  /** @type {Stroke | null} 当前正在绘制的笔迹 */
  let currentStroke = null;

  /** @type {'idle' | 'drawing' | 'panning'} */
  let gestureState = 'idle';

  /** @type {Map<number, { x: number, y: number }>} */
  const activePointers = new Map();

  /**
   * @typedef {Object} PanStartState
   * @property {number} offsetX
   * @property {{ x: number, y: number }} centerScreen
   */

  /** @type {PanStartState | null} */
  let panStart = null;

  /**
   * 更新逻辑画布宽度
   */
  function updateLogicalWidth() {
    logicalW = viewW * (isExtended ? LOGICAL_WIDTH_RATIO_EXTENDED : LOGICAL_WIDTH_RATIO_DEFAULT);
    offsetX = clampOffsetX(offsetX);
  }

  /**
   * 获取当前最大水平偏移
   * @returns {number}
   */
  function getMaxOffsetX() {
    return Math.max(0, logicalW - viewW);
  }

  /**
   * @param {number} x
   * @returns {number}
   */
  function clampOffsetX(x) {
    return Math.max(0, Math.min(getMaxOffsetX(), x));
  }

  /**
   * @returns {number}
   */
  function getLogicalH() {
    return viewH;
  }

  /**
   * @param {number} screenX
   * @param {number} screenY
   * @returns {Point}
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    const localX = screenX - rect.left;
    const localY = screenY - rect.top;
    const canvasX = (localX / rect.width) * viewW;
    const canvasY = (localY / rect.height) * viewH;
    return {
      x: offsetX + canvasX,
      y: Math.max(0, Math.min(getLogicalH(), canvasY))
    };
  }

  /**
   * 调整画布尺寸
   */
  function resizeCanvas() {
    const rect = container.getBoundingClientRect();
    viewW = rect.width;
    viewH = rect.height;
    updateLogicalWidth();

    const dpr = window.devicePixelRatio || 1;
    canvas.width = viewW * dpr;
    canvas.height = viewH * dpr;
    canvas.style.width = viewW + 'px';
    canvas.style.height = viewH + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    render();
    updateUI();
  }

  /**
   * 渲染画布
   */
  function render() {
    ctx.clearRect(0, 0, viewW, viewH);
    ctx.save();
    ctx.translate(-offsetX, 0);

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = STROKE_LINE_WIDTH;

    const allStrokes = currentStroke ? [...strokes, currentStroke] : strokes;

    for (const stroke of allStrokes) {
      if (stroke.points.length < 2) {
        if (stroke.points.length === 1) {
          const p = stroke.points[0];
          ctx.beginPath();
          ctx.arc(p.x, p.y, STROKE_LINE_WIDTH / 2, 0, Math.PI * 2);
          ctx.fillStyle = '#1a1a1a';
          ctx.fill();
        }
        continue;
      }
      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
      for (let i = 1; i < stroke.points.length; i++) {
        ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
      }
      ctx.stroke();
    }

    ctx.restore();
  }

  /**
   * @returns {boolean}
   */
  function hasValidStroke() {
    return strokes.some(s => s.points.length > 0);
  }

  /**
   * @returns {{ minX: number, minY: number, maxX: number, maxY: number } | null}
   */
  function getStrokeBounds() {
    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;
    let hasPoint = false;

    for (const stroke of strokes) {
      for (const p of stroke.points) {
        hasPoint = true;
        minX = Math.min(minX, p.x);
        minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.x);
        maxY = Math.max(maxY, p.y);
      }
    }

    if (!hasPoint) return null;

    const pad = STROKE_LINE_WIDTH / 2 + CROP_PADDING;
    return {
      minX: Math.max(0, minX - pad),
      minY: Math.max(0, minY - pad),
      maxX: Math.min(logicalW, maxX + pad),
      maxY: Math.min(getLogicalH(), maxY + pad)
    };
  }

  /**
   * @returns {string | null}
   */
  function exportSignatureImage() {
    const bounds = getStrokeBounds();
    if (!bounds) return null;

    const cropW = bounds.maxX - bounds.minX;
    const cropH = bounds.maxY - bounds.minY;
    if (cropW <= 0 || cropH <= 0) return null;

    const exportCanvas = document.createElement('canvas');
    const dpr = window.devicePixelRatio || 1;
    exportCanvas.width = cropW * dpr;
    exportCanvas.height = cropH * dpr;
    const exportCtx = exportCanvas.getContext('2d');
    exportCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    exportCtx.fillStyle = '#fff';
    exportCtx.fillRect(0, 0, cropW, cropH);

    exportCtx.lineCap = 'round';
    exportCtx.lineJoin = 'round';
    exportCtx.strokeStyle = '#1a1a1a';
    exportCtx.lineWidth = STROKE_LINE_WIDTH;

    for (const stroke of strokes) {
      if (stroke.points.length < 2) {
        if (stroke.points.length === 1) {
          const p = stroke.points[0];
          exportCtx.beginPath();
          exportCtx.arc(p.x - bounds.minX, p.y - bounds.minY, STROKE_LINE_WIDTH / 2, 0, Math.PI * 2);
          exportCtx.fillStyle = '#1a1a1a';
          exportCtx.fill();
        }
        continue;
      }
      exportCtx.beginPath();
      exportCtx.moveTo(stroke.points[0].x - bounds.minX, stroke.points[0].y - bounds.minY);
      for (let i = 1; i < stroke.points.length; i++) {
        exportCtx.lineTo(stroke.points[i].x - bounds.minX, stroke.points[i].y - bounds.minY);
      }
      exportCtx.stroke();
    }

    return exportCanvas.toDataURL('image/png');
  }

  /**
   * @returns {boolean}
   */
  function isDefaultView() {
    return offsetX === 0;
  }

  /**
   * @returns {boolean}
   */
  function isViewAdjusted() {
    return isExtended || offsetX > 0;
  }

  /**
   * 更新 UI 状态
   */
  function updateUI() {
    const maxOffset = getMaxOffsetX();
    btnPanLeft.disabled = offsetX <= 0.5;
    btnPanRight.disabled = offsetX >= maxOffset - 0.5;
    btnResetView.disabled = isDefaultView();
    btnFitPreview.disabled = !hasValidStroke();

    if (isViewAdjusted()) {
      positionScrollbar.hidden = false;
      updateScrollbar();
    } else {
      positionScrollbar.hidden = true;
    }

    placeholder.classList.toggle('is-hidden', hasValidStroke() || (currentStroke && currentStroke.points.length > 0));

    const canComplete = hasValidStroke() || (currentStroke && currentStroke.points.length > 0);
    btnComplete.disabled = !canComplete;
  }

  /**
   * 更新底部位移滚动条
   */
  function updateScrollbar() {
    const visibleLogicalW = viewW;
    const thumbRatio = visibleLogicalW / logicalW;
    const thumbWidth = Math.max(24, thumbRatio * 100);
    const maxThumbLeft = 100 - thumbRatio * 100;
    const thumbLeft = getMaxOffsetX() > 0
      ? (offsetX / getMaxOffsetX()) * maxThumbLeft
      : 0;

    scrollbarThumb.style.width = thumbWidth + '%';
    scrollbarThumb.style.left = thumbLeft + '%';
  }

  /**
   * @param {string} message
   */
  function showToast(message) {
    toast.textContent = message;
    toast.hidden = false;
    setTimeout(() => { toast.hidden = true; }, 2500);
  }

  /**
   * 收起工具栏，恢复「更多签署区域」按钮
   */
  function hideToolsPanel() {
    canvasToolsWrap.classList.remove('is-expanded');
    btnToggleTools.hidden = false;
    btnToggleTools.setAttribute('aria-expanded', 'false');
  }

  /**
   * 展开工具栏，隐藏「更多签署区域」按钮
   */
  function showToolsPanel() {
    canvasToolsWrap.classList.add('is-expanded');
    btnToggleTools.hidden = true;
    btnToggleTools.setAttribute('aria-expanded', 'true');
  }

  /**
   * 点击「更多签署区域」：扩展画板并展开工具栏
   */
  function openSigningAreaTools() {
    if (!isExtended) {
      isExtended = true;
      updateLogicalWidth();
      trackEvent('h5_handwriting_canvas_extend', { logicalWidthRatio: LOGICAL_WIDTH_RATIO_EXTENDED });
    }
    showToolsPanel();
  }

  /**
   * 恢复默认视角
   */
  function resetView() {
    const fromOffsetX = offsetX;
    offsetX = 0;
    hideToolsPanel();
    render();
    updateUI();
    trackEvent('h5_handwriting_view_reset', { fromOffsetX, hasStroke: hasValidStroke() });
  }

  /**
   * 清空笔迹并重置
   */
  function rewrite() {
    strokes = [];
    currentStroke = null;
    gestureState = 'idle';
    activePointers.clear();
    isExtended = false;
    offsetX = 0;
    updateLogicalWidth();
    hideToolsPanel();
    render();
    updateUI();
    trackEvent('h5_handwriting_rewrite', { hasStroke: false, offsetX });
  }

  /**
   * 左右平移视角
   * @param {number} direction 正数右移视角，负数左移视角
   */
  function panByStep(direction) {
    const step = viewW * PAN_STEP_RATIO;
    const prevOffset = offsetX;
    offsetX = clampOffsetX(offsetX + direction * step);
    if (Math.abs(offsetX - prevOffset) < 0.5) return;

    render();
    updateUI();
    trackEvent('h5_handwriting_canvas_pan', {
      fromOffsetX: prevOffset,
      toOffsetX: offsetX,
      hasStroke: hasValidStroke()
    });
  }

  /**
   * 将画布视角适配到已书写笔迹区域
   */
  function fitViewToStrokes() {
    const bounds = getStrokeBounds();
    if (!bounds) {
      showToast('请先签名');
      return;
    }

    const boundsW = bounds.maxX - bounds.minX;
    const pad = CROP_PADDING;

    if (boundsW <= viewW) {
      offsetX = clampOffsetX((bounds.minX + bounds.maxX) / 2 - viewW / 2);
    } else {
      offsetX = clampOffsetX(bounds.minX - pad);
    }

    render();
    updateUI();
    trackEvent('h5_handwriting_fit_preview', {
      offsetX,
      strokeBoundsWidth: boundsW,
      hasStroke: true
    });
  }

  /**
   * @param {string} event
   * @param {Record<string, unknown>} params
   */
  function trackEvent(event, params) {
    console.log('[Track]', event, params);
  }

  /**
   * @param {Event} e
   */
  function preventDefault(e) {
    e.preventDefault();
  }

  /**
   * @param {PointerEvent} e
   */
  function onPointerDown(e) {
    if (!container.contains(e.target)) return;

    if (e.pointerType === 'touch' || e.pointerType === 'pen') {
      e.preventDefault();
    }

    container.setPointerCapture(e.pointerId);
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    hideToolsPanel();

    if (activePointers.size === 1) {
      gestureState = 'drawing';
      const logical = screenToLogical(e.clientX, e.clientY);
      if (logical.x >= 0 && logical.x <= logicalW && logical.y >= 0 && logical.y <= getLogicalH()) {
        currentStroke = { points: [logical] };
      }
    } else if (activePointers.size === 2) {
      if (currentStroke && currentStroke.points.length > 0) {
        strokes.push(currentStroke);
      }
      currentStroke = null;
      gestureState = 'panning';

      const points = Array.from(activePointers.values());
      panStart = {
        offsetX,
        centerScreen: { x: (points[0].x + points[1].x) / 2, y: (points[0].y + points[1].y) / 2 }
      };
    } else if (activePointers.size > 2) {
      if (currentStroke && currentStroke.points.length > 0) {
        strokes.push(currentStroke);
      }
      currentStroke = null;
      gestureState = 'idle';
    }

    render();
    updateUI();
  }

  /**
   * @param {PointerEvent} e
   */
  function onPointerMove(e) {
    if (!activePointers.has(e.pointerId)) return;

    if (e.pointerType === 'touch' || e.pointerType === 'pen') {
      e.preventDefault();
    }

    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (gestureState === 'drawing' && activePointers.size === 1 && currentStroke) {
      const logical = screenToLogical(e.clientX, e.clientY);
      if (logical.x >= -10 && logical.x <= logicalW + 10 && logical.y >= -10 && logical.y <= getLogicalH() + 10) {
        const last = currentStroke.points[currentStroke.points.length - 1];
        if (!last || Math.hypot(logical.x - last.x, logical.y - last.y) > 0.5) {
          currentStroke.points.push(logical);
        }
      }
      render();
      updateUI();
    } else if (gestureState === 'panning' && activePointers.size === 2 && panStart) {
      const points = Array.from(activePointers.values());
      const centerX = (points[0].x + points[1].x) / 2;
      const panDx = centerX - panStart.centerScreen.x;

      if (Math.abs(panDx) > 2) {
        const prevOffset = offsetX;
        offsetX = clampOffsetX(panStart.offsetX - panDx);
        if (Math.abs(offsetX - prevOffset) > 0.5) {
          trackEvent('h5_handwriting_canvas_pan', {
            fromOffsetX: prevOffset,
            toOffsetX: offsetX,
            hasStroke: hasValidStroke()
          });
        }
      }

      render();
      updateUI();
    }
  }

  /**
   * @param {PointerEvent} e
   */
  function onPointerUp(e) {
    if (!activePointers.has(e.pointerId)) return;

    activePointers.delete(e.pointerId);

    try {
      container.releasePointerCapture(e.pointerId);
    } catch (_) { /* ignore */ }

    if (gestureState === 'drawing' && activePointers.size === 0) {
      if (currentStroke && currentStroke.points.length > 0) {
        strokes.push(currentStroke);
      }
      currentStroke = null;
      gestureState = 'idle';
    } else if (gestureState === 'panning' && activePointers.size < 2) {
      panStart = null;
      gestureState = 'idle';
    }

    if (activePointers.size === 0) {
      gestureState = 'idle';
      panStart = null;
    }

    render();
    updateUI();
  }

  /**
   * @param {PointerEvent} e
   */
  function onPointerCancel(e) {
    onPointerUp(e);
  }

  // ─── 按钮事件 ───

  btnPanLeft.addEventListener('click', (e) => {
    e.stopPropagation();
    panByStep(-1);
  });

  btnPanRight.addEventListener('click', (e) => {
    e.stopPropagation();
    panByStep(1);
  });

  btnResetView.addEventListener('click', (e) => {
    e.stopPropagation();
    resetView();
  });

  btnFitPreview.addEventListener('click', (e) => {
    e.stopPropagation();
    fitViewToStrokes();
  });

  btnToggleTools.addEventListener('click', (e) => {
    e.stopPropagation();
    openSigningAreaTools();
  });

  document.getElementById('btnRewrite').addEventListener('click', () => {
    if (hasValidStroke() && !confirm('确定要清空当前签名并重新书写吗？')) return;
    rewrite();
  });

  document.getElementById('btnComplete').addEventListener('click', () => {
    hideToolsPanel();

    if (!hasValidStroke()) {
      showToast('请先签名');
      return;
    }

    const dataUrl = exportSignatureImage();
    if (!dataUrl) {
      showToast('请先签名');
      return;
    }

    const bounds = getStrokeBounds();
    trackEvent('h5_handwriting_complete', {
      offsetX,
      strokeBoundsWidth: bounds ? bounds.maxX - bounds.minX : 0,
      strokeBoundsHeight: bounds ? bounds.maxY - bounds.minY : 0,
      isOutOfViewport: bounds ? (bounds.minX < offsetX || bounds.maxX > offsetX + viewW) : false,
      cropApplied: true
    });

    previewImage.src = dataUrl;
    previewModal.hidden = false;
  });

  document.getElementById('btnBack').addEventListener('click', () => {
    if (hasValidStroke() && !confirm('签名尚未提交，确定返回吗？')) return;
    showToast('已返回');
  });

  document.getElementById('btnClosePreview').addEventListener('click', () => {
    previewModal.hidden = true;
  });

  document.getElementById('previewBackdrop').addEventListener('click', () => {
    previewModal.hidden = true;
  });

  container.addEventListener('click', (e) => {
    if (e.target === container || e.target === canvas) {
      hideToolsPanel();
    }
  });

  document.addEventListener('click', (e) => {
    const wrap = document.getElementById('canvasToolsWrap');
    if (wrap && !wrap.contains(e.target)) {
      hideToolsPanel();
    }
  });

  container.addEventListener('touchstart', preventDefault, { passive: false });
  container.addEventListener('touchmove', preventDefault, { passive: false });
  container.addEventListener('contextmenu', (e) => e.preventDefault());
  container.addEventListener('selectstart', (e) => e.preventDefault());
  container.addEventListener('dragstart', (e) => e.preventDefault());

  container.addEventListener('pointerdown', onPointerDown);
  container.addEventListener('pointermove', onPointerMove);
  container.addEventListener('pointerup', onPointerUp);
  container.addEventListener('pointercancel', onPointerCancel);
  container.addEventListener('pointerleave', onPointerUp);

  window.addEventListener('resize', resizeCanvas);

  resizeCanvas();
  updateUI();
})();

  </script>
</body>
</html>
